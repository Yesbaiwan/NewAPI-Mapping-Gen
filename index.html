  </head>
  <body class="font-sans leading-relaxed text-slate-400 bg-slate-950 min-h-screen p-5 selection:bg-indigo-500/30">
    <div class="max-w-[1600px] mx-auto">
      <div class="relative overflow-hidden rounded-2xl bg-slate-900/80 border border-white/10 backdrop-blur-xl mb-8 shadow-2xl shadow-black/50">
        <div class="absolute top-0 left-1/4 w-32 h-32 bg-indigo-500/10 rounded-full blur-3xl"></div>
        <div class="relative flex flex-col md:flex-row items-center justify-between gap-4 p-6">
          <div class="flex items-center gap-4">
            <div class="flex items-center justify-center w-12 h-12 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 shadow-lg shadow-indigo-500/30 text-white text-2xl">⚡</div>
            <div>
              <h1 class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-indigo-200 to-purple-200 tracking-wide">NewAPI Mapping Generator</h1>
              <p class="text-xs text-gray-400 font-medium tracking-wider uppercase mt-0.5">NewAPI 模型映射生成</p>
            </div>
          </div>
          <div class="hidden md:flex items-center gap-3">
            <label class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-black/20 border border-white/5 cursor-pointer hover:bg-black/30 transition-colors">
              <input type="checkbox" id="showApiEndpoint" class="checkbox-base" />
              <span class="text-xs text-slate-300">自定义端点</span>
            </label>
            <label class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-black/20 border border-white/5 cursor-pointer hover:bg-black/30 transition-colors">
              <input type="checkbox" id="enableFilter" class="checkbox-base" checked />
              <span class="text-xs text-slate-300">启用过滤</span>
            </label>
            <div class="relative">
              <button
                id="filterSettingsBtn"
                class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-indigo-500/10 border border-indigo-500/30 text-indigo-300 hover:bg-indigo-500/20 transition-colors"
              >
                <span>⚙️</span>
                <span class="text-xs font-medium">过滤设置</span>
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-[400px_1fr] gap-6 items-start">
        <div class="lg:sticky lg:top-5 flex flex-col gap-6">
          <div class="bg-slate-900/50 backdrop-blur-md rounded-xl shadow-lg p-6 transition-all duration-300 border border-white/5 hover:border-indigo-500/30 hover:shadow-xl">
            <div class="flex items-center mb-5 pb-4 border-b-2 border-slate-700/50">
              <h2 class="text-slate-200 text-2xl m-0">⚙️ API配置</h2>
            </div>
            <div class="mb-4">
              <label for="apiUrl" class="block mb-1.5 font-semibold text-gray-300">API URL:</label>
              <input type="text" id="apiUrl" class="input-base" value="https://ollama.com" />
            </div>
            <div class="mb-4 hidden" id="apiEndpointGroup">
              <label for="apiEndpoint" class="block mb-1.5 font-semibold text-gray-300">API 端点:</label>
              <input type="text" id="apiEndpoint" class="input-base" value="/v1/models" />
              <small class="text-gray-300 opacity-70 block mt-1.5">API的模型端点路径</small>
            </div>
            <div class="mb-4">
              <label for="apiKey" class="block mb-1.5 font-semibold text-gray-300">API 密钥:</label>
              <input type="text" id="apiKey" class="input-base" value="sk-123456" />
            </div>
            <div class="text-right mt-5" id="btnGroup"></div>
          </div>
        </div>

        <div class="flex flex-col gap-6">
          <div class="bg-slate-900/50 backdrop-blur-md rounded-xl shadow-lg p-6 transition-all duration-300 border border-white/5 hover:border-indigo-500/30 hover:shadow-xl">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 min-h-[500px]">
              <div class="flex flex-col overflow-hidden">
                <div class="flex justify-between items-center mb-2.5 p-3 bg-slate-800 rounded-lg border-l-4 border-primary">
                  <h3 class="m-0 text-slate-200 font-semibold flex-1 text-xl">源模型列表</h3>
                  <button
                    id="copyToFinalBtn"
                    class="p-1.5 px-3 text-xs rounded-lg bg-success text-white border-none cursor-pointer inline-flex items-center gap-1 transition-all duration-300 hover:opacity-90 hover:-translate-y-0.5"
                  >
                    <span class="mr-2">➡️</span>
                    <span>复制</span>
                  </button>
                </div>
                <div class="flex-1 flex flex-col overflow-hidden">
                  <textarea id="allModels" placeholder="从API获取的原始模型将显示在此，每行一个。"></textarea>
                </div>
              </div>
              <div class="flex flex-col overflow-hidden">
                <div class="flex justify-between items-center mb-2.5 p-3 bg-slate-800 rounded-lg border-l-4 border-primary">
                  <h3 class="m-0 text-slate-200 font-semibold flex-1 text-xl">最终模型列表</h3>
                </div>
                <div class="flex-1 flex flex-col overflow-hidden">
                  <textarea id="finalModels" placeholder="过滤或编辑后的最终模型将显示在此，每行一个。"></textarea>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div id="filterPopover" class="hidden fixed z-[100] w-96 bg-slate-900 border border-slate-700 rounded-xl shadow-2xl p-4 transform origin-top-right transition-all">
        <div class="mb-4">
          <label class="block text-xs text-slate-400 mb-2">过滤模式</label>
          <div class="flex gap-3">
            <label class="cursor-pointer flex items-center gap-1.5">
              <input type="radio" name="filterMode" value="exclude" class="checkbox-base radio-base" checked />
              <span class="text-xs text-slate-300">排除</span>
            </label>
            <label class="cursor-pointer flex items-center gap-1.5">
              <input type="radio" name="filterMode" value="include" class="checkbox-base radio-base" />
              <span class="text-xs text-slate-300">保留</span>
            </label>
          </div>
        </div>
        <div class="mb-4">
          <label for="excludeKeywords" class="block text-xs text-slate-400 mb-1.5">排除关键词 (逗号分隔)</label>
          <textarea
            id="excludeKeywords"
            rows="3"
            class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs text-slate-300 focus:border-indigo-500 focus:outline-none resize-y font-mono"
          >
distill,bge,embedding,evil,flux,live,qvq,qwq,audio,tts,veo,gemma,gemini-1.5,gemini-2.0,writer,baichuan,phi</textarea
          >
        </div>
        <div>
          <label for="includeKeywords" class="block text-xs text-slate-400 mb-1.5">保留关键词 (逗号分隔)</label>
          <textarea
            id="includeKeywords"
            rows="3"
            class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs text-slate-300 focus:border-indigo-500 focus:outline-none resize-y font-mono"
          >
gpt,gemini,claude,grok,deepseek,glm,minimax,kimi,doubao,qwen</textarea
          >
        </div>
      </div>

      <div id="statusContainer"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script>
// 配置常量
const STORAGE_PREFIX = 'modelGet_';

const DEFAULT_CONFIG = {
  apiUrl: 'https://ollama.com',
  apiEndpoint: '/v1/models',
  apiKey: 'sk-123456',
  excludeKeywords: 'distill,bge,embedding,evil,flux,live,qvq,qwq,audio,tts,veo,gemma,gemini-1.5,gemini-2.0,writer,baichuan,phi',
  includeKeywords: 'gpt,gemini,claude,grok,deepseek,glm,minimax,kimi,doubao,qwen',
};

const CONFIG_FIELDS = {
  ApiUrl: { el: 'apiUrl', def: DEFAULT_CONFIG.apiUrl },
  ApiEndpoint: { el: 'apiEndpoint', def: DEFAULT_CONFIG.apiEndpoint },
  ApiKey: { el: 'apiKey', def: DEFAULT_CONFIG.apiKey },
  ExcludeKeywords: { el: 'excludeKeywords', def: DEFAULT_CONFIG.excludeKeywords },
  IncludeKeywords: { el: 'includeKeywords', def: DEFAULT_CONFIG.includeKeywords },
  EnableFilter: { el: 'enableFilter', type: 'checkbox', def: true },
  ShowApiEndpoint: { el: 'showApiEndpoint', type: 'checkbox', def: false },
  FilterMode: { type: 'radio', name: 'filterMode', def: 'exclude' },
};

const STATUS_COLORS = {
  success: 'bg-green-500/90 text-white',
  error: 'bg-red-500/90 text-white',
  info: 'bg-indigo-500/90 text-white',
  warning: 'bg-yellow-500/90 text-white',
};

const BTN_CONFIG = [
  {
    id: 'fetchBtn',
    icon: '🔄',
    text: '获取模型列表',
    cls: 'bg-indigo-600 hover:bg-indigo-700',
    fn: 'fetchModels',
  },
  {
    id: 'copyFinalBtn',
    icon: '📋',
    text: '复制最终模型',
    cls: 'bg-emerald-600 hover:bg-emerald-700',
    fn: 'copyFinalModels',
  },
  {
    id: 'copyMappingBtn',
    icon: '⚡',
    text: '复制模型映射',
    cls: 'bg-cyan-600 hover:bg-cyan-700',
    fn: 'copyMappingResult',
  },
  {
    id: 'clearBtn',
    icon: '🗑️',
    text: '清空模型列表',
    cls: 'bg-violet-600 hover:bg-violet-700',
    fn: 'clearEditor',
  },
  {
    id: 'clearConfigBtn',
    icon: '🧹',
    text: '清除API配置',
    cls: 'bg-red-600 hover:bg-red-700',
    fn: 'clearApiConfig',
  },
];

// 工具函数
const $ = (id) => document.getElementById(id);
const getStorage = (k, d) => localStorage.getItem(STORAGE_PREFIX + k) ?? d;
const setStorage = (k, v) => localStorage.setItem(STORAGE_PREFIX + k, v);
const parseModels = (t) =>
  (t || '')
    .split('\n')
    .map((s) => s.trim())
    .filter(Boolean);
const toggleHidden = (el, hide) => {
  if (el) el.classList.toggle('hidden', hide);
};

async function fetchJson(url, options = {}) {
  const res = await fetch(url, {
    ...options,
    headers: { 'Content-Type': 'application/json', ...options.headers },
  });
  if (!res.headers.get('content-type')?.includes('json')) {
    throw new Error('服务器返回非JSON响应');
  }
  if (!res.ok) {
    let msg = '请求失败';
    try {
      msg = (await res.json()).error || msg;
    } catch {}
    throw new Error(msg);
  }
  return res.json();
}

async function copyToClipboard(text, msg) {
  if (!text) {
    showStatus('⚠️ 没有可复制的内容', 'warning');
    return;
  }
  try {
    await navigator.clipboard.writeText(text);
    showStatus(msg, 'success');
  } catch (e) {
    showStatus('❌ 复制失败: ' + e.message, 'error');
  }
}

function getConfig() {
  const radio = document.querySelector('input[name="filterMode"]:checked');
  return {
    apiUrl: $('apiUrl').value,
    apiEndpoint: $('apiEndpoint').value,
    apiKey: $('apiKey').value,
    enableFilter: $('enableFilter').checked,
    excludeKeywords: $('excludeKeywords').value,
    includeKeywords: $('includeKeywords').value,
    filterMode: radio ? radio.value : 'exclude',
  };
}

// 编辑器操作
let allModelsEditor, finalModelsEditor;

function initEditors() {
  const cfg = {
    mode: 'text/plain',
    theme: 'material-darker',
    lineNumbers: true,
    lineWrapping: true,
    viewportMargin: Infinity,
  };
  allModelsEditor = CodeMirror.fromTextArea($('allModels'), cfg);
  finalModelsEditor = CodeMirror.fromTextArea($('finalModels'), cfg);
}

function getEditorValues() {
  return {
    allModels: allModelsEditor.getValue(),
    finalModels: finalModelsEditor.getValue(),
  };
}

function setEditorValues(a, f) {
  allModelsEditor.setValue(a);
  finalModelsEditor.setValue(f);
}

function clearEditors() {
  allModelsEditor.setValue('');
  finalModelsEditor.setValue('');
}

function copyToFinalModels() {
  finalModelsEditor.setValue(allModelsEditor.getValue());
  showStatus('✅ 源模型已复制到最终模型列表', 'success');
}

function clearEditor() {
  clearEditors();
  showStatus('✅ 模型列表已清空', 'success');
}

// 存储管理
function saveConfig() {
  Object.entries(CONFIG_FIELDS).forEach(([k, v]) => {
    if (v.type === 'checkbox') {
      const el = $(v.el);
      if (el) setStorage(k, el.checked);
    } else if (v.type === 'radio') {
      const c = document.querySelector(`input[name="${v.name}"]:checked`);
      setStorage(k, c ? c.value : v.def);
    } else {
      const el = $(v.el);
      if (el) setStorage(k, el.value);
    }
  });
}

function loadConfig() {
  Object.entries(CONFIG_FIELDS).forEach(([k, v]) => {
    const s = getStorage(k, v.def);
    if (v.type === 'checkbox') {
      const el = $(v.el);
      if (el) el.checked = s === 'true' || s === true;
    } else if (v.type === 'radio') {
      const r = document.querySelector(`input[name="${v.name}"][value="${s}"]`);
      if (r) r.checked = true;
    } else {
      const el = $(v.el);
      if (el) el.value = s;
    }
  });
  toggleHidden($('apiEndpointGroup'), !$('showApiEndpoint').checked);
}

function clearApiConfig() {
  $('apiUrl').value = DEFAULT_CONFIG.apiUrl;
  $('apiEndpoint').value = DEFAULT_CONFIG.apiEndpoint;
  $('apiKey').value = DEFAULT_CONFIG.apiKey;
  saveConfig();
  showStatus('✅ 配置已还原', 'success');
}

// API 操作
async function fetchModels() {
  try {
    showStatus('正在获取模型列表...', 'info');
    const cfg = getConfig();
    const r = await fetchJson('/fetch', {
      method: 'POST',
      body: JSON.stringify(cfg),
    });
    const { filteredModels = [], totalCount = 0, filteredCount = 0 } = r;
    setEditorValues(filteredModels.join('\n'), filteredModels.map(m => m.toLowerCase()).join('\n'));
    showStatus(cfg.enableFilter ? `✅ 成功获取 ${totalCount} 个模型，过滤后剩余 ${filteredCount} 个` : `✅ 成功获取 ${totalCount} 个模型`, 'success');
  } catch (e) {
    showStatus('❌ 获取失败: ' + e.message, 'error');
  }
}

async function generateMapping() {
  const { allModels, finalModels } = getEditorValues();
  const { mapping } = await fetchJson('/generate-mapping', {
    method: 'POST',
    body: JSON.stringify({
      allModels: parseModels(allModels),
      finalModels: parseModels(finalModels),
    }),
  });
  return mapping;
}

async function copyFinalModels() {
  await copyToClipboard(parseModels(getEditorValues().finalModels).join(', '), '✅ 最终模型已复制到剪贴板');
}

async function copyMappingResult() {
  try {
    const mapping = await generateMapping();
    if (!Object.keys(mapping).length) {
      showStatus('⚠️ 映射前后无变化', 'warning');
      return;
    }
    await copyToClipboard(JSON.stringify(mapping, null, 2), '✅ 模型映射已复制到剪贴板');
  } catch (e) {
    showStatus('❌ 生成映射失败: ' + e.message, 'error');
  }
}

// UI 交互
function showStatus(msg, type) {
  const div = document.createElement('div');
  div.className = `fixed bottom-5 left-1/2 -translate-x-1/2 px-6 py-3 rounded-lg font-medium shadow-lg backdrop-blur-sm transition-all duration-300 transform translate-y-10 opacity-0 z-[1000] ${STATUS_COLORS[type] || STATUS_COLORS.info}`;
  div.textContent = msg;
  $('statusContainer').innerHTML = '';
  $('statusContainer').appendChild(div);
  requestAnimationFrame(() => div.classList.remove('translate-y-10', 'opacity-0'));
  setTimeout(() => {
    div.classList.add('translate-y-10', 'opacity-0');
    setTimeout(() => div.remove(), 300);
  }, 3000);
}

function initPopover() {
  const btn = $('filterSettingsBtn'),
    pop = $('filterPopover');
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (pop.classList.contains('hidden')) {
      const r = btn.getBoundingClientRect();
      pop.style.top = `${r.bottom + 8}px`;
      pop.style.left = 'auto';
      pop.style.right = `${window.innerWidth - r.right}px`;
      pop.classList.remove('hidden');
    } else {
      pop.classList.add('hidden');
    }
  });
  document.addEventListener('click', (e) => {
    if (!pop.contains(e.target) && e.target !== btn) pop.classList.add('hidden');
  });
  pop.addEventListener('click', (e) => e.stopPropagation());
}

function initButtons() {
  $('btnGroup').innerHTML = BTN_CONFIG.map(({ id, icon, text, cls }) => `<button id="${id}" class="btn-base ${cls} text-white"><span class="mr-2">${icon}</span><span>${text}</span></button>`).join(
    '',
  );
  const fnMap = { fetchModels, copyFinalModels, copyMappingResult, clearEditor, clearApiConfig };
  BTN_CONFIG.forEach(({ id, fn }) => $(id).addEventListener('click', fnMap[fn]));
  $('copyToFinalBtn').addEventListener('click', copyToFinalModels);
}

function initEventListeners() {
  $('showApiEndpoint').addEventListener('change', function () {
    toggleHidden($('apiEndpointGroup'), !this.checked);
    if (!this.checked) $('apiEndpoint').value = '/v1/models';
    saveConfig();
  });
  ['apiUrl', 'apiKey', 'apiEndpoint', 'excludeKeywords', 'includeKeywords'].forEach((id) => $(id).addEventListener('blur', saveConfig));
  $('enableFilter').addEventListener('change', saveConfig);
  document.querySelectorAll('input[name="filterMode"]').forEach((r) => r.addEventListener('change', saveConfig));
}

// 主入口
document.addEventListener('DOMContentLoaded', function () {
  initEditors();
  loadConfig();
  initPopover();
  initButtons();
  initEventListeners();
});

</script>
